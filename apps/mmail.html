<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MMail</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    display:flex;
    gap:20px;
}

.sidebar{
    width:220px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.main{
    flex:1;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.compose{
    background:#b45309;
    color:white;
    width:100%;
}

.menu{
    margin-top:15px;
}

.menu p{
    padding:8px;
    cursor:pointer;
}

.menu p:hover{
    background:#f2f2f2;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>📧 MMail</h2>

        <button>Sign In</button>
        <button>Sign Up</button>

        <br><br>

        <button class="compose">
            ✉ Compose
        </button>

        <div class="menu">
            <p>📥 Inbox</p>
            <p>⭐ Starred</p>
            <p>📤 Sent</p>
            <p>📝 Drafts</p>
            <p>🗑 Trash</p>
        </div>

    </div>

    <div class="main">

        <h1>Inbox</h1>

        <hr>

        <p><b>Welcome to MMail</b></p>

        <p>Your private mail system is active.</p>

        <p>No new messages.</p>

    </div>

</div>

</body>
</html>
