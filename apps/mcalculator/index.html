<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCalculator Pro</title>
<style>
*{ box-sizing: border-box; font-family: Arial, sans-serif; transition: 0.1s; }
body { margin: 0; background: #f1f1f1; padding: 20px; }
.calc-container { max-width: 500px; margin: auto; margin-top: 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,.15); }
.grid-layout { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
button { padding: 15px 5px; font-size: 18px; border: none; border-radius: 10px; background: #e2e8f0; cursor: pointer; }
button:hover { background: #cbd5e1; transform: scale(1.02); }
.btn-clear { background: #ef4444; color: white; }
.btn-equal { background: #16a34a; color: white; font-weight: bold; }
#calcDisplay{ width: 100%; padding: 15px; font-size: 28px; text-align: right; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
</style>
</head>
<body>
<div id="app"></div>
<script>
let calcHistory = JSON.parse(localStorage.getItem("mcalc_history") || "[]");   
 let lastExpression = "";
function loadCalculator(){
document.getElementById("app").innerHTML = `
<h1 style="color:#b45309; text-align:center;">🧮 MCalculator Pro</h1>
<div class="calc-container">
    <input id="calcDisplay" readonly placeholder="0">
    <div class="grid-layout">
        <button class="btn-clear" onclick="calcClear()">C</button>
        <button onclick="calcBack()">⌫</button>
        <button onclick="calcAdd('%')">%</button>
        <button onclick="calcAdd('(')">(</button>
        <button onclick="calcAdd(')')">)</button>
        <button onclick="calcFunc('sin')">sin</button>
        <button onclick="calcFunc('cos')">cos</button>
        <button onclick="calcFunc('tan')">tan</button>
        <button onclick="calcFunc('log')">log</button>
        <button onclick="calcFunc('ln')">ln</button>
        <button onclick="calcAdd('7')">7</button>
        <button onclick="calcAdd('8')">8</button>
        <button onclick="calcAdd('9')">9</button>
        <button onclick="calcAdd('÷')">÷</button>
        <button onclick="calcSqrt()">√</button>
        <button onclick="calcAdd('4')">4</button>
        <button onclick="calcAdd('5')">5</button>
        <button onclick="calcAdd('6')">6</button>
        <button onclick="calcAdd('×')">×</button>
        <button onclick="calcSquare()">x²</button>
        <button onclick="calcAdd('1')">1</button>
        <button onclick="calcAdd('2')">2</button>
        <button onclick="calcAdd('3')">3</button>
        <button onclick="calcAdd('-')">−</button>
        <button onclick="calcCube()">x³</button>
        <button onclick="calcAdd('0')">0</button>
        <button onclick="calcAdd('.')">.</button>
        <button onclick="calcAdd('3.1415926535')">π</button>
        <button onclick="calcAdd('+')">+</button>
        <button class="btn-equal" onclick="calcResult()">=</button>
        <button onclick="calcAdd('2.718281828')">e</button>
        <button onclick="calcAdd('^')">xʸ</button>
    </div>
    <div id="calcHistory" style="margin-top:30px; background:#f8fafc; padding:15px; border-radius:10px; font-size:14px; max-height:150px; overflow-y:auto;">
        <b>History</b><br><br>
    </div>
</div>`;
document.getElementById("calcHistory").innerHTML =
    "<b>History</b><br><br>" +
    calcHistory.slice(0, 8).join("<br>");
}

function calcAdd(val){ document.getElementById("calcDisplay").value += val; }
function calcClear(){ document.getElementById("calcDisplay").value = ""; }
function calcBack(){ let d = document.getElementById("calcDisplay"); d.value = d.value.slice(0, -1); }

function evaluateCurrentDisplay() {
    let d = document.getElementById("calcDisplay");
    if (!d.value) return 0;
    try {
        let expr = d.value.replace(/×/g, "*").replace(/÷/g, "/").replace(/%/g, "/100").replace(/\^/g, "**");
        return Function('"use strict"; return (' + expr + ')')();
    } catch (e) { return null; }
}

function calcSquare(){
    let d = document.getElementById("calcDisplay"); let v = evaluateCurrentDisplay();
    if(v !== null) d.value = Math.pow(v, 2); else alert("Invalid Expression");
}
function calcCube(){
    let d = document.getElementById("calcDisplay"); let v = evaluateCurrentDisplay();
    if(v !== null) d.value = Math.pow(v, 3); else alert("Invalid Expression");
}
function calcSqrt(){
    let d = document.getElementById("calcDisplay"); let v = evaluateCurrentDisplay();
    if(v !== null && v >= 0) d.value = Math.sqrt(v); else alert("Invalid Operation");
}

function calcFunc(type){
    let d = document.getElementById("calcDisplay");
    let input = d.value;
    let v = evaluateCurrentDisplay();

    if (v === null || input === "") {
        alert("Enter expression first");
        return;
    }

    let result;

    if(type === "sin") result = Math.sin(v * Math.PI / 180);
    if(type === "cos") result = Math.cos(v * Math.PI / 180);
    if(type === "tan") result = Math.tan(v * Math.PI / 180);
    if(type === "log") result = Math.log10(v);
    if(type === "ln")  result = Math.log(v);

    d.value = result;

    calcHistory.unshift(type + "(" + input + ") = " + result);
    localStorage.setItem("mcalc_history", JSON.stringify(calcHistory));

    document.getElementById("calcHistory").innerHTML =
        "<b>History</b><br><br>" +
        calcHistory.slice(0, 8).join("<br>");
}


function calcResult(){
    let display = document.getElementById("calcDisplay"); let rawExpr = display.value;
    if(!rawExpr) return;
    try {
        let expr = rawExpr.replace(/×/g, "*").replace(/÷/g, "/").replace(/%/g, "/100").replace(/\^/g, "**");
        let result = Function('"use strict"; return (' + expr + ')')();
        let historyExpr = rawExpr
    .replace(/\*\*/g, "^")
    .replace(/×/g, "×")
    .replace(/÷/g, "÷");

calcHistory.unshift(historyExpr + " = " + result);

localStorage.setItem("mcalc_history", JSON.stringify(calcHistory));

document.getElementById("calcHistory").innerHTML =
"<b>History</b><br><br>" +
calcHistory.slice(0, 8).join("<br>");
        display.value = result;
    } catch (err) { alert("Invalid Calculation"); }
}
loadCalculator();
</script>
</body>
</html>
