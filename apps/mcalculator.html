```html
<!DOCTYPE html>
<html>
<head>
<title>MCalculator Pro</title>
</head>
<body>

<div id="app"></div>

<script>

function loadCalculator(){

document.getElementById("app").innerHTML = `

<h1 style="color:#b45309;text-align:center;">
🧮 MCalculator Pro
</h1>

<div style="
max-width:500px;
margin:auto;
margin-top:30px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.15);
">

<input
id="calcDisplay"
readonly
style="
width:100%;
padding:15px;
font-size:28px;
text-align:right;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
">

<div style="
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
">

<button onclick="calcClear()">C</button>
<button onclick="calcBack()">⌫</button>
<button onclick="calcAdd('%')">%</button>
<button onclick="calcAdd('(')">(</button>
<button onclick="calcAdd(')')">)</button>

<button onclick="calcFunc('sin')">sin</button>
<button onclick="calcFunc('cos')">cos</button>
<button onclick="calcFunc('tan')">tan</button>
<button onclick="calcFunc('log')">log</button>
<button onclick="calcFunc('ln')">ln</button>

<button onclick="calcAdd('7')">7</button>
<button onclick="calcAdd('8')">8</button>
<button onclick="calcAdd('9')">9</button>
<button onclick="calcAdd('/')">÷</button>
<button onclick="calcSqrt()">√</button>

<button onclick="calcAdd('4')">4</button>
<button onclick="calcAdd('5')">5</button>
<button onclick="calcAdd('6')">6</button>
<button onclick="calcAdd('*')">×</button>
<button onclick="calcSquare()">x²</button>

<button onclick="calcAdd('1')">1</button>
<button onclick="calcAdd('2')">2</button>
<button onclick="calcAdd('3')">3</button>
<button onclick="calcAdd('-')">−</button>
<button onclick="calcCube()">x³</button>

<button onclick="calcAdd('0')">0</button>
<button onclick="calcAdd('.')">.</button>
<button onclick="calcAdd('3.1415926535')">π</button>
<button onclick="calcAdd('+')">+</button>

<button
onclick="calcResult()"
style="
background:#16a34a;
color:white;
font-weight:bold;
">
=
</button>

<button onclick="calcAdd('2.718281828')">e</button>
<button onclick="calcPower()">xʸ</button>

</div>

<div id="calcHistory"
style="
margin-top:30px;
background:#f8fafc;
padding:15px;
border-radius:10px;
font-size:14px;
max-height:150px;
overflow-y:auto;
">
<b>History</b><br><br>
</div>

</div>

`;

}

function calcAdd(val){
document.getElementById("calcDisplay").value += val;
}

function calcClear(){
document.getElementById("calcDisplay").value="";
}

function calcBack(){
let d=document.getElementById("calcDisplay");
d.value=d.value.slice(0,-1);
}

function calcSquare(){
let d=document.getElementById("calcDisplay");
d.value=Math.pow(Number(d.value),2);
}

function calcCube(){
let d=document.getElementById("calcDisplay");
d.value=Math.pow(Number(d.value),3);
}

function calcSqrt(){
let d=document.getElementById("calcDisplay");
d.value=Math.sqrt(Number(d.value));
}

function calcPower(){
calcAdd("**");
}

function calcFunc(type){

let d=document.getElementById("calcDisplay");
let v=Number(d.value);

if(type==="sin") d.value=Math.sin(v*Math.PI/180);
if(type==="cos") d.value=Math.cos(v*Math.PI/180);
if(type==="tan") d.value=Math.tan(v*Math.PI/180);
if(type==="log") d.value=Math.log10(v);
if(type==="ln") d.value=Math.log(v);

}

let calcHistory = [];

function calcResult(){

try{

let expr=document
.getElementById("calcDisplay")
.value
.replace(/%/g,"/100");

let result=eval(expr);

calcHistory.push(expr + " = " + result);

document.getElementById("calcHistory").innerHTML =
"<b>History</b><br><br>" +
calcHistory.join("<br>");

document.getElementById("calcDisplay").value=result;

}catch{

alert("Invalid Calculation");

}

}

loadCalculator();

</script>

</body>

</html>
