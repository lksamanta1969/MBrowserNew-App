<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MBrowser</title>
    <link rel="stylesheet" href="apps/browser/Style.css">
</head>
<body>

  <div class="apps-menu" id="appsMenu">
    <div class="app" onclick="openApp('mmail')">📧 MMail</div>
    <div class="app" onclick="openApp('mnote')">📝 MNote</div>
    <div class="app" onclick="openApp('mtube')">📺 MTube</div>
    <div class="app" onclick="openApp('mdrive')">📁 MDrive</div>
    <div class="app" onclick="openApp('mpay')">💵 MPay</div>
    <div class="app" onclick="openApp('mcalculator')">🧮 MCalculator</div>
    <div class="app" onclick="openApp('mcalender')">📅 MCalender</div>
  </div>    
      
  <div class="header">
    <div class="tabs">
      <div class="tab active" onclick="newTab()">New Tab</div>
      <button class="addtab" onclick="newTab()">+</button>
    </div>
    <div class="topbar">
      <button onclick="goBack()">←</button>
      <button onclick="goForward()">→</button>
      <button onclick="refreshPage()">⟳</button>
      
      <input id="url" placeholder="Search Google or Enter URL" onkeypress="if(event.key==='Enter'){loadSite()}">
      
    <button id="appsBtn" onclick="toggleApps()">⋮</button>
      <button onclick="loadSite()">Go</button>
    </div>
  </div>

  <div id="home" class="home">
    <img src="mbrowser-logo.ico" id="homeLogo">
    <h1>MBrowser</h1>
    <p>Search Anything</p>
    <input id="homesearch" placeholder="Search Google or type a URL" onkeydown="if(event.key==='Enter'){ homeSearch() }">
    <button id="googleBtn" onclick="googleLogin()">Sign in with Google</button>
  </div>

 <webview id="browser" src=""></webview>

 <script src="apps/browser/BrowserTab.js"></script>
 <script src="apps/browser/browser.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuf4IiFtv3290Wn2-djiCs_gLCJ-2uGMA",
  authDomain: "mmail-4b997.firebaseapp.com",
  projectId: "mmail-4b997",
  storageBucket: "mmail-4b997.firebasestorage.app",
  messagingSenderId: "1062349668151",
  appId: "1:1062349668151:web:f64edf3646ab9b6834a4b2"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.googleLogin = function(){
    const provider = new GoogleAuthProvider();
    
    // ETA JOG KORUN: Eta user-ke account select korar sujog deye
    provider.setCustomParameters({
        prompt: 'select_account'
    });

    signInWithPopup(auth, provider)
    .then((result)=>{ 
        alert("Welcome " + result.user.displayName); 
        console.log("Logged in user email:", result.user.email);
    })
    .catch((error)=>{ alert(error.message); });
}

</script>
</body>
</html>
