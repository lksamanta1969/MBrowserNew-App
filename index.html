<!DOCTYPE html>
<html>
<head>
<title>MBrowser</title>
<style>
body{ margin:0; font-family:Arial; background:#f1f1f1; overflow:hidden; }
.header{ background:#b45309; padding:8px; }
.tabs{ display:flex; align-items:center; margin-bottom:8px; }
.tab{ background:#f5d7aa; border:none; padding:10px 20px; border-radius:12px 12px 0 0; font-size:14px; cursor:pointer;}
.addtab{ margin-left:5px; border:none; background:transparent; font-size:24px; color:white; cursor:pointer;}
.topbar{ background:#92400e; padding:10px; display:flex; align-items:center; gap:8px; border-radius:10px; }
.topbar button{ height:40px; border:none; border-radius:20px; padding:0 15px; cursor:pointer; font-weight:bold;}
#url{ flex:1; height:40px; border:none; border-radius:25px; padding:0 20px; font-size:16px; outline:none;}
.home{ text-align:center; padding-top:100px; background:#ffffff; min-height:100vh; }
.home h1{ font-size:80px; color:#b85a17; font-weight:700; margin-top:0; margin-bottom:10px; }
.home p{ font-size:24px; color:#555; }
#homesearch{ width:600px; max-width:85%; padding:15px; border-radius:30px; border:1px solid #d4a373; box-shadow:0 4px 12px rgba(184,90,23,0.15); font-size:18px; text-align:center; outline:none; }
#homesearch:focus{ border:2px solid #b85a17; box-shadow:0 0 12px rgba(184,90,23,0.25); }
#googleBtn{ margin-top:20px; padding:12px 25px; border:none; border-radius:25px; background:#4285F4; color:white; font-size:16px; cursor:pointer; display:block; margin:20px auto; }
#homeLogo{ width:260px; height:260px; object-fit:contain; display:block; margin:0 auto -50px auto; }
webview{ width:100%; height:calc(100vh - 140px); display:none; background:white; }

/* Apps menu design */
.apps-menu{
 display:none;
 position:fixed;
 top:85px;
 right:20px;
 background:white;
 padding:15px;
 border-radius:20px;
 box-shadow:0 5px 20px rgba(0,0,0,0.2);
 flex-direction:column;
 gap:10px;
 z-index:99999999;
 border:3px solid red;
}
.app{ padding:12px; border-radius:10px; cursor:pointer; font-size:20px; color:#333;}
.app:hover{ background:#f1f1f1; color:#b45309;
}

#appsBtn{
    font-size:24px;
    padding:0 18px;
    background:#fafafa;
    color:#333;
    border:none;
    border-radius:25px;
    cursor:pointer;
}
</style>
</head>
<body>

  <div class="apps-menu" id="appsMenu">
    <div class="app" onclick="openApp('mmail')">📧 MMail</div>
    <div class="app" onclick="openApp('mnotes')">📝 MNotes</div>
    <div class="app" onclick="openApp('mtube')">📺 MTube</div>
    <div class="app" onclick="openApp('mdrive')">📁 MDrive</div>
    <div class="app" onclick="openApp('mpay')">💵 MPay</div>
    <div class="app" onclick="openApp('mcalculator')">🧮 MCalculator</div>
    <div class="app" onclick="openApp('mcalender')">📅 MCalender</div>
  </div>    
      
  <div class="header">
    <div class="tabs">
      <div class="tab active" onclick="newTab()">New Tab</div>
      <button class="addtab" onclick="newTab()">+</button>
    </div>
    <div class="topbar">
      <button onclick="goBack()">←</button>
      <button onclick="goForward()">→</button>
      <button onclick="refreshPage()">⟳</button>
      
      <input id="url" placeholder="Search Google or Enter URL" onkeypress="if(event.key==='Enter'){loadSite()}">
      
    <button id="appsBtn" onclick="toggleApps()">⋮</button>
      <button onclick="loadSite()">Go</button>
    </div>
  </div>

  <div id="home" class="home">
    <img src="mbrowser-logo.ico" id="homeLogo">
    <h1>MBrowser</h1>
    <p>Search Anything</p>
    <input id="homesearch" placeholder="Search Google or type a URL" onkeydown="if(event.key==='Enter'){ homeSearch() }">
    <button id="googleBtn" onclick="googleLogin()">Sign in with Google</button>
  </div>

<webview id="browser" src=""></webview>

<script>
const browser = document.getElementById("browser");
let onHomePage = true;

function goBack() {
    if (onHomePage) return;

    if (browser.canGoBack()) {
        browser.goBack();
    } else {
        lastPageBeforeHome = browser.getURL();

        browser.style.display = "none";
        document.getElementById("home").style.display = "block";
        document.getElementById("url").value = "";
        onHomePage = true;
    }
}

function goForward() {

    if (onHomePage && lastPageBeforeHome) {
        document.getElementById("home").style.display = "none";
        browser.style.display = "flex";
        browser.src = lastPageBeforeHome;
        onHomePage = false;
        return;
    }

    if (!onHomePage && browser.canGoForward()) {
        browser.goForward();
    }
}

function openApp(appName) {
    toggleApps();
    document.getElementById("home").style.display = "none";
    browser.style.display = "flex";
    onHomePage = false;

    const appUrl = "http://localhost:3000/apps/" + appName + "/index.html";

    browser.src = appUrl;
    console.log("OPENING:", appUrl);
}

function loadSite(){
    let url = document.getElementById("url").value.trim();
    if(url === "") return;
    if(!url.startsWith("http://") && !url.startsWith("https://")){
        if(url.includes(".")){ url = "https://" + url; }
        else { url = "https://www.google.com/search?q=" + encodeURIComponent(url); }
    }
    document.getElementById("home").style.display = "none";
    browser.style.display = "flex";
    browser.src = url;
    onHomePage = false;
}

browser.addEventListener("did-navigate", (e) => {
    document.getElementById("url").value = e.url;
});

function newTab(){
    browser.src = "";
    browser.style.display = "none";
    document.getElementById("url").value = "";
    document.getElementById("home").style.display = "block";
    document.getElementById("homesearch").value = "";
    onHomePage = true;
}

function homeSearch(){
    document.getElementById("url").value = document.getElementById("homesearch").value;
    loadSite();
}

function toggleApps() {
    const menu = document.getElementById("appsMenu");

    if (menu.style.display === "flex") {
        menu.style.display = "none";
    } else {
        menu.style.display = "flex";
    }
}

window.onload = function(){
    document.getElementById("appsMenu").style.display = "none";
    setTimeout(() => { document.getElementById("url").focus(); }, 300);
}
</script>

<script type="module">

import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

window.googleLogin = function(){
    const provider = new GoogleAuthProvider();
    
    // ETA JOG KORUN: Eta user-ke account select korar sujog deye
    provider.setCustomParameters({
        prompt: 'select_account'
    });

    signInWithPopup(auth, provider)
    .then((result)=>{ 
        alert("Welcome " + result.user.displayName); 
        console.log("Logged in user email:", result.user.email);
    })
    .catch((error)=>{ alert(error.message); });
}

</script>
</body>
</html>
