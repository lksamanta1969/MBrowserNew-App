function sendMoney(){

let receiver =
document.getElementById("receiver").value;

let amount =
parseFloat(
document.getElementById("amount").value
);

if(!receiver || !amount){
if(amount <= 0){
alert("Invalid Amount");
return;
}
alert("Enter Details");
return;
}

if(amount > walletBalance){
alert("Insufficient Balance");
return;
}

walletBalance -= amount;

localStorage.setItem(
"mpayBalance",
walletBalance
);

transactions.push(
"Sent ₹" + amount + " to " + receiver
);

localStorage.setItem(
"mpayHistory",
JSON.stringify(transactions)
);

alert("Money Sent");

openMPay();

}

async function showInbox(){

let html = `<h1>📥 Inbox</h1>`;

if(inboxMails.length===0){

html += `<p>No mails found.</p>`;

}else{

inboxMails.forEach(mail=>{

html += `

async function showDrafts(){

  let drafts = await fetch("http://localhost:3000/draft")
  .then(r => r.json());

  let html = `
  <h1>📝 Drafts</h1>
  `;

  if(drafts.length===0){

    html += `<p>No drafts available.</p>`;

  }else{

    drafts.forEach((mail,index)=>{

      html += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;border-radius:10px;">
        <b>To:</b> ${mail.to}<br>
        <b>Subject:</b> ${mail.subject}<br>
        <b>Message:</b> ${mail.msg}<br><br>

        <button onclick="deleteDraft(${index})">
          Delete
        </button>
      </div>
      `;
    });

  }

  document.getElementById("mailContent").innerHTML = html;

}

async function sendMail(){

let to=document.getElementById("toMail").value;

let cc=document.getElementById("ccMail").value;

let subject=document.getElementById("subjectMail").value;

let body=document.getElementById("bodyMail").value;

try{


const response = await fetch("http://localhost:3000/send",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify({
    to,
    cc,
    subject,
    msg:body
  })
});

const result = await response.text();

console.log("Server Response:", result);

if(!response.ok){
  alert(result);
  return;
}

}catch(err){

alert("Mail sending failed");

console.log(err);

return;

}


sentMails.push({
to,
cc,
subject,
body
});

/* Load Website */
function goBack(){

const browser = document.getElementById("browser");

if(!browser || browser.style.display==="none"){
    console.log("No browser active");
    return;
}

try{
    if(browser.canGoBack()){
        browser.goBack();
    }else{
        console.log("No back history");
    }
}catch(err){
    console.log(err);
}

}

function goForward(){

const browser = document.getElementById("browser");

if(!browser || browser.style.display==="none"){
    console.log("No browser active");
    return;
}

try{
    if(browser.canGoForward()){
        browser.goForward();
    }else{
        console.log("No forward history");
    }
}catch(err){
    console.log(err);
}

}

function toggleApps(){

let menu=document.getElementById("appsMenu");

if(menu.style.display==="flex"){
menu.style.display="none";
}else{
menu.style.display="flex";
}

}

window.onload=function(){

}

function openApp(url){

let browser=document.getElementById("browser");

browser.loadURL(url);

document.getElementById("home").style.display="none";

browser.style.display="flex";

}
